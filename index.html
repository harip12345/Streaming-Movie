<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notflix</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='4'%20fill='%23000'/%3E%3Cpolygon%20points='6,3%209,3%2018,21%2015,21'%20fill='%23e50914'/%3E%3Crect%20x='6'%20y='3'%20width='3'%20height='18'%20fill='%23e50914'/%3E%3Crect%20x='15'%20y='3'%20width='3'%20height='18'%20fill='%23e50914'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{--bg:#141414;--text:#fff;--text-dim:#b3b3b3;--primary:#e50914;--rating:#46d369;--card-radius:4px;--row-gap:.4vw}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow-x:hidden}
  img{display:block}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:0;height:0}

  /* HEADER */
  header{position:fixed;top:0;left:0;width:100%;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 4%;transition:background-color .4s ease,padding .4s ease;background:linear-gradient(to bottom,rgba(0,0,0,.9) 0%,rgba(0,0,0,.5) 50%,transparent 100%)}
  header.scrolled{background:rgba(10,10,10,.96);padding:12px 4%;box-shadow:0 2px 14px rgba(0,0,0,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .header-left{display:flex;align-items:center;gap:28px}
  .logo{font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:2.45rem;font-weight:400;letter-spacing:1.5px;line-height:1;cursor:pointer;text-transform:uppercase;background:linear-gradient(180deg,#f6121d 0%,#b1060f 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;transform:perspective(55px) rotateX(7deg);transform-origin:center bottom;filter:drop-shadow(0 4px 6px rgba(0,0,0,.55)) drop-shadow(0 1px 0 rgba(0,0,0,.45));transition:transform .25s ease}
  .logo:hover{transform:perspective(55px) rotateX(7deg) scale(1.05)}
  .main-nav{display:flex;gap:18px}
  .main-nav button{background:none;border:none;color:#e5e5e5;font-size:.9rem;cursor:pointer;transition:color .3s;white-space:nowrap;position:relative;padding:2px 0}
  .main-nav button:hover,.main-nav button.active{color:#fff;font-weight:600}
  .nav-right{display:flex;align-items:center;gap:16px}
  .search-container{display:flex;align-items:center;border:1px solid transparent;background:transparent;transition:all .3s;border-radius:4px}
  .search-container.open{border-color:rgba(255,255,255,.6);background:rgba(0,0,0,.75);padding:6px 10px}
  .search-icon{cursor:pointer;fill:#fff;width:22px;height:22px}
  #search-input{background:transparent;border:none;color:#fff;outline:none;font-size:.9rem;width:0;padding:0;transition:width .4s ease,padding .4s ease}
  .search-container.open #search-input{width:190px;padding-left:10px}

  /* FILTER BAR */
  .filter-bar{position:fixed;top:56px;left:0;width:100%;z-index:48;display:none;gap:26px;align-items:center;flex-wrap:wrap;padding:8px 4%;background:linear-gradient(to bottom,rgba(0,0,0,.85),rgba(0,0,0,.25))}
  .filter-bar.open{display:flex;max-height:calc(100vh - 70px);overflow-y:auto}
  @media(min-width:901px){#nav-seg{display:none}}
  .filter-toggle{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);border-radius:5px;width:34px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
  .filter-toggle:hover{background:rgba(255,255,255,.25)}
  .filter-toggle.active{background:var(--primary);border-color:var(--primary)}
  .filter-group{display:flex;align-items:center;gap:8px}
  .seg-label{color:#9a9a9a;font-size:.78rem}
  .seg{display:inline-flex;background:rgba(40,40,40,.85);border-radius:6px;padding:3px;gap:2px;flex-wrap:wrap}
  .seg-btn{background:none;border:none;color:#bbb;padding:6px 13px;border-radius:5px;cursor:pointer;font-size:.82rem;transition:all .2s;white-space:nowrap}
  .seg-btn:hover{color:#fff}
  .seg-btn.active{background:var(--primary);color:#fff;font-weight:600}

  /* HERO */
  .hero{position:relative;height:88vh;min-height:560px;width:100%;background-size:cover;background-position:center 18%;display:flex;align-items:center}
  .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(20,20,20,.96) 0%,rgba(20,20,20,.6) 28%,rgba(20,20,20,.1) 55%,transparent 78%),linear-gradient(to top,var(--bg) 0%,rgba(20,20,20,.45) 16%,transparent 42%)}
  .hero-content{position:relative;z-index:2;padding:0 4%;max-width:640px}
  .hero-tag{display:inline-block;background:var(--primary);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:1.5px;padding:3px 9px;border-radius:3px;margin-bottom:14px}
  .hero-title{font-size:4rem;font-weight:900;margin-bottom:18px;line-height:1.02;letter-spacing:-1.2px;text-shadow:2px 2px 10px rgba(0,0,0,.65)}
  .hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:14px;font-size:1rem}
  .hero-meta .match{color:var(--rating);font-weight:700}
  .hero-overview{font-size:1.05rem;line-height:1.5;color:#e5e5e5;margin-bottom:24px;max-width:520px;text-shadow:1px 1px 4px rgba(0,0,0,.7);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-buttons{display:flex;gap:14px}
  .btn{display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;font-size:1.1rem;font-weight:700;padding:12px 30px;border-radius:6px;transition:transform .15s ease,opacity .25s,background .25s}
  .btn:hover{transform:scale(1.04)}
  .btn svg{width:24px;height:24px}
  .btn-play{background:#fff;color:#000}
  .btn-play:hover{background:rgba(255,255,255,.78)}
  .btn-info{background:rgba(109,109,110,.7);color:#fff}
  .btn-info:hover{background:rgba(109,109,110,.5)}

  /* ROWS */
  .rows-wrap{position:relative;z-index:3;margin-top:-130px;padding-bottom:50px}
  .rows-wrap.pushed{margin-top:78px}
  body.filters-open .rows-wrap.pushed{margin-top:122px}
  .row{margin:0 0 2.2vw 0}
  .row-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 4% .3em}
  .row-title{font-size:1.42rem;font-weight:800;color:#e5e5e5;letter-spacing:.2px}
  .more-btn-inline{background:none;border:none;color:#54b9ff;cursor:pointer;font-size:.8rem;font-weight:700;opacity:0;transform:translateX(-6px);transition:opacity .25s,transform .25s;display:inline-flex;align-items:center;gap:3px}
  .row:hover .more-btn-inline{opacity:1;transform:translateX(0)}
  .more-btn-inline span{font-size:1rem;transition:transform .2s}
  .more-btn-inline:hover span{transform:translateX(3px)}
  .row-slider-wrap{position:relative}
  /* padding vertikal memberi ruang agar zoom hover tidak terpotong & tidak ganggu scroll */
  .row-slider{display:flex;gap:var(--row-gap);overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;padding:26px 4%;scroll-padding:0 4%}
  .slider-arrow{position:absolute;top:26px;bottom:26px;width:4%;z-index:20;background:rgba(20,20,20,.5);border:none;cursor:pointer;color:#fff;font-size:2.4rem;opacity:0;transition:opacity .2s,background .2s;display:flex;align-items:center;justify-content:center}
  .row-slider-wrap:hover .slider-arrow{opacity:1}
  .slider-arrow:hover{background:rgba(20,20,20,.8)}
  .slider-arrow.left{left:0}
  .slider-arrow.right{right:0}

  /* CARD */
  .card{position:relative;flex:0 0 auto;width:15vw;min-width:185px;max-width:230px;border-radius:var(--card-radius);cursor:pointer;transition:transform .35s ease;background:#181818}
  .card-poster{position:relative}
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--card-radius);background:#222}
  .type-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.78);color:#fff;font-size:.6rem;font-weight:700;letter-spacing:.5px;padding:3px 6px;border-radius:3px}
  .type-badge.film{background:rgba(229,9,20,.9)}
  .card:hover{transform:scale(1.12);z-index:30;box-shadow:0 16px 42px rgba(0,0,0,.82)}
  .card-info{position:absolute;left:0;right:0;bottom:0;padding:12px;background:linear-gradient(to top,#181818 35%,transparent);opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;border-radius:0 0 var(--card-radius) var(--card-radius)}
  .card:hover .card-info{opacity:1;transform:translateY(0)}
  .card-info h3{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
  .icon-btn{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(42,42,42,.6);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s}
  .icon-btn:hover{border-color:#fff;background:rgba(60,60,60,.9)}
  .icon-btn svg{width:15px;height:15px;fill:#fff;stroke:#fff}
  .icon-btn.play{background:#fff}
  .icon-btn.play svg{fill:#000;stroke:#000}
  .icon-btn.saved svg{fill:var(--rating);stroke:var(--rating)}
  .card-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.76rem;color:#ddd}
  .card-meta .match{color:var(--rating);font-weight:700}

  /* TOP 10 */
  .top-card{display:flex;align-items:flex-end;flex:0 0 auto;width:23vw;min-width:270px;max-width:340px}
  .top-rank{font-size:11vw;line-height:.78;font-weight:900;color:#0a0a0a;-webkit-text-stroke:3px #6f6f6f;letter-spacing:-1vw;margin-right:-2.2vw;z-index:1;user-select:none;text-shadow:0 0 18px rgba(0,0,0,.5)}
  .top-card .card{width:10vw;min-width:140px}

  /* GRID (Lihat Semua / Pencarian / Daftar Saya) */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;padding:0 4% 30px}
  .grid .card{width:100%;min-width:0;max-width:none}
  .grid .card:hover{transform:scale(1.05)}
  .cat-head{padding:6px 4% 2px;display:flex;align-items:center;gap:14px}
  .back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);color:#fff;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s;white-space:nowrap}
  .back-btn:hover{background:rgba(255,255,255,.25)}
  .cat-title{font-size:1.7rem;font-weight:800}
  .more-wrap{text-align:center;padding:20px 0 70px}
  .more-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.35);color:#fff;padding:12px 30px;border-radius:6px;cursor:pointer;font-size:.95rem;font-weight:600;transition:background .2s}
  .more-btn:hover{background:rgba(255,255,255,.22)}

  /* MODAL */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;justify-content:center;align-items:flex-start;overflow-y:auto;padding:40px 0}
  .modal.open{display:flex}
  .modal-card{position:relative;width:92%;max-width:900px;background:#181818;border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.8);animation:pop .3s ease}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-hero{position:relative;width:100%;aspect-ratio:16/9;background-size:cover;background-position:center}
  .modal-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,#181818,transparent 60%)}
  .modal-player{width:100%;aspect-ratio:16/9;border:none;background:#000}
  .modal-hero-content{position:absolute;bottom:0;left:0;z-index:3;padding:0 40px 28px}
  .modal-hero-content h2{font-size:2.2rem;font-weight:800;margin-bottom:18px;text-shadow:2px 2px 6px rgba(0,0,0,.7)}
  .modal-body{padding:20px 40px 36px}
  .modal-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:.95rem;margin-bottom:16px;color:#ddd}
  .modal-meta .match{color:var(--rating);font-weight:700}
  .modal-meta .tag{border:1px solid rgba(255,255,255,.4);padding:1px 7px;border-radius:3px;font-size:.8rem}
  .modal-overview{font-size:1rem;line-height:1.55;color:#e5e5e5}
  .modal-genres{margin-top:14px;color:#777;font-size:.9rem}
  .close-btn{position:absolute;top:14px;right:14px;z-index:10;width:38px;height:38px;border-radius:50%;background:#181818;border:none;color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .close-btn:hover{background:#333}

  /* PLAYER LAYAR PENUH */
  .modal.player-mode{align-items:stretch;justify-content:stretch;padding:0;overflow:hidden}
  .modal.player-mode .modal-card{width:100vw;height:100vh;max-width:none;border-radius:0;background:#000;display:block;animation:none}
  .modal.player-mode .close-btn{display:none}
  .player-wrap{position:relative;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center}
  .player-wrap .modal-player{width:100%;height:100%;aspect-ratio:auto;border:none}
  .fs-btn{flex:0 0 auto;width:44px;height:44px;border-radius:8px;background:rgba(0,0,0,.55);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .fs-btn:hover{background:rgba(0,0,0,.9)}
  .fs-btn svg{width:24px;height:24px}
  .player-ctrl{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.55);padding:7px 11px;border-radius:8px;color:#fff;font-size:.85rem}
  .player-ctrl select{background:#222;color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:5px;padding:5px 8px;font-size:.85rem;cursor:pointer;outline:none}
  .player-bar{position:absolute;top:50%;right:14px;transform:translateY(-50%);z-index:18;display:flex;flex-direction:column;align-items:flex-end;gap:12px;background:none;padding:0;transition:opacity .35s}
  .modal.player-mode.ui-idle .player-bar{opacity:0}
  .modal.player-mode.ui-idle .player-bar>*{pointer-events:none}
  .modal.player-mode.ui-idle .close-btn{opacity:0;pointer-events:none}
  .modal.player-mode.ui-idle .player-wrap{cursor:none}
  .sub-hint{font-size:.72rem;color:#46d369;white-space:nowrap}
  /* DETAIL TAMBAHAN */
  .modal-sec-title{font-size:1.15rem;font-weight:700;margin:22px 0 12px}
  .cast-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px}
  .cast-item{flex:0 0 auto;width:92px;text-align:center}
  .cast-item img{width:92px;height:92px;border-radius:50%;object-fit:cover;background:#333;margin:0 auto 6px}
  .cast-item .nm{font-size:.78rem;font-weight:600;line-height:1.2}
  .cast-item .ch{font-size:.72rem;color:#888;line-height:1.2}
  .ep-list{display:flex;flex-direction:column;gap:10px}
  .ep-item{display:flex;gap:14px;background:#222;border-radius:6px;padding:10px;cursor:pointer;transition:background .2s}
  .ep-item:hover{background:#2e2e2e}
  .ep-still{flex:0 0 auto;width:140px;aspect-ratio:16/9;border-radius:4px;object-fit:cover;background:#333}
  .ep-num{font-weight:700;color:#888;margin-right:6px}
  .ep-info h4{font-size:.92rem;margin-bottom:4px}
  .ep-info p{font-size:.8rem;color:#aaa;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ep-season-sel{background:#222;color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:5px;padding:6px 10px;font-size:.9rem;margin-bottom:10px;cursor:pointer}
  .rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
  .card-overview{font-size:.74rem;color:#bbb;margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .sort-sel{margin-left:auto;background:#222;color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:5px;padding:7px 12px;font-size:.88rem;cursor:pointer}
  /* STREAMING BOLA */
  .sport-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;padding:0 4% 44px}
  .sport-card{background:#181818;border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid rgba(255,255,255,.06)}
  .sport-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 38px rgba(0,0,0,.75)}
  .sport-poster{position:relative;aspect-ratio:16/9;background:#0c0c0c;display:flex;align-items:center;justify-content:center}
  .sport-poster img{width:100%;height:100%;object-fit:cover}
  .sport-noimg{font-size:2.4rem;opacity:.5}
  .live-badge{position:absolute;top:8px;left:8px;background:var(--primary);color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:3px;display:flex;align-items:center;gap:4px;animation:livePulse 1.6s infinite}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.45}}
  .sport-info{padding:11px 13px 14px}
  .sport-info h3{font-size:.92rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sport-time{margin-top:6px;font-size:.76rem;color:#9a9a9a}
  .sportseg .seg-btn.live{display:inline-flex;align-items:center;gap:6px}
  .sportseg .seg-btn.live::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 7px var(--primary);animation:livePulse 1.6s infinite}
  .sportseg .seg-btn.live.active::before{background:#fff;box-shadow:0 0 7px #fff}

  .message{text-align:center;font-size:1.1rem;color:#999;padding:40px;width:100%}
  .spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:900px){
    .main-nav{display:none}
    .hero-title{font-size:2.6rem;letter-spacing:-.5px}
    .hero-overview{font-size:.95rem}
    .card{width:30vw}
    .top-card{width:52vw}
    .top-rank{font-size:22vw}
    .filter-bar{top:54px;gap:14px}
    .btn{font-size:.95rem;padding:9px 18px}
    .btn svg{width:20px;height:20px}
  }
  @media(max-width:560px){
    .card{width:40vw}
    .hero{height:70vh}
    .modal-hero-content,.modal-body{padding-left:20px;padding-right:20px}
    .rows-wrap.pushed{margin-top:74px}
    body.filters-open .rows-wrap.pushed{margin-top:150px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
    .grid .card-info h3{font-size:.74rem}
    .cat-title{font-size:1.3rem}
    .hero-buttons{gap:8px}
    .btn{font-size:.8rem;padding:7px 14px;gap:6px}
    .btn svg{width:16px;height:16px}
  }
</style>
</head>
<body>

<header id="header">
  <div class="header-left">
    <span class="logo" id="logo">Notflix</span>
    <nav class="main-nav" id="main-nav"></nav>
  </div>
  <div class="nav-right">
    <button class="filter-toggle" id="filter-toggle" title="Filter"><svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M3 5h18l-7 8v6l-4-2v-4z"/></svg></button>
    <div class="search-container" id="search-container">
      <svg class="search-icon" id="search-icon" viewBox="0 0 24 24"><path d="M21.71 20.29l-3.4-3.39A8.94 8.94 0 0020 11a9 9 0 10-9 9 8.94 8.94 0 005.9-2.69l3.39 3.4a1 1 0 001.42-1.42zM4 11a7 7 0 117 7 7 7 0 01-7-7z"/></svg>
      <input type="text" id="search-input" placeholder="Judul, orang, genre">
    </div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <div class="filter-group" id="nav-seg"></div>
  <div class="filter-group" id="media-seg"></div>
  <div class="filter-group" id="region-seg"></div>
  <div class="filter-group" id="provider-seg"></div>
  <div class="filter-group" id="sport-seg"></div>
</div>

<section class="hero" id="hero"></section>

<div class="rows-wrap" id="rows-wrap"><div class="spinner"></div></div>

<div class="modal" id="modal">
  <div class="modal-card" id="modal-card">
    <button class="close-btn" id="close-btn">&times;</button>
    <div id="modal-inner"></div>
  </div>
</div>

<script>
  // ===== KONFIGURASI =====
  const API_KEY = '006ce472ff1d269dacb4ff625e4301ef'; // GANTI dengan API key TMDB Anda
  const BASE = 'https://api.themoviedb.org/3';
  const IMG = 'https://image.tmdb.org/t/p/w500';
  const BACKDROP = 'https://image.tmdb.org/t/p/original';
  const LANG = 'id-ID';

  // Genre dengan ID berbeda untuk Film (movie) vs Series (tv)
  const GENRES = [
    {key:'action',label:'Aksi',movie:28,tv:10759},
    {key:'adventure',label:'Petualangan',movie:12,tv:10759},
    {key:'comedy',label:'Komedi',movie:35,tv:35},

    {key:'horror',label:'Horor',movie:27,tv:9648},
    {key:'thriller',label:'Thriller',movie:53,tv:9648},
    {key:'mystery',label:'Misteri',movie:9648,tv:9648},
    {key:'scifi',label:'Fiksi Ilmiah',movie:878,tv:10765},

    {key:'drama',label:'Drama',movie:18,tv:18},
    {key:'documentary',label:'Dokumenter',movie:99,tv:99},
  ];
  const REGIONS = {
    all:{label:'Semua',lang:null},
    id:{label:'\ud83c\uddee\ud83c\udde9 Indonesia',lang:'id'},
    ko:{label:'\ud83c\uddf0\ud83c\uddf7 Korea',lang:'ko'},

    {key:'all',label:'Semua'},

  // Layanan streaming (TMDB watch providers)
  const WATCH_REGION = 'US';
  const PROVIDERS = {
    all:{label:'Semua',id:null},
    netflix:{label:'Netflix',id:8},
    disney:{label:'Disney+',id:337},
    prime:{label:'Prime Video',id:9},

  // Filter India
  const BLOCKED_LANGS = ['hi','ta','te','ml','kn','bn','pa','mr','gu','or','as','ur'];
  const BLOCKED_COUNTRY = 'IN';

  // ===== STREAMING BOLA (LIVE) =====
  // Sumber data & embed pihak ketiga. Bila endpoint berubah/diblokir, cukup perbarui dua konstanta ini.
  const SPORT_API = 'https://streamed.pk';   // jadwal & gambar (alternatif: streamed.su / streamed.st)
  const SPORT_EMBED = 'https://embedme.top'; // basis embed cadangan bila API tidak mengembalikan embedUrl

  const state = {tab:'home',media:'all',region:'all',provider:'all',query:'',catDef:null,catPage:1,catItems:[],sort:'default'};
  let suppressRoute=false;

  // ===== ELEMEN =====
  const header = document.getElementById('header');

  // ===== FETCH & URL =====
  async function fetchJSON(url){const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
  const trendingURL = media => `${BASE}/trending/${media}/week?api_key=${API_KEY}&language=${LANG}`;
  function discoverURL(media,{genre,lang,page=1,latest=false,boxoffice=false,provider=null,sortKey=null}={}){
    let sort = latest ? (media==='tv' ? 'first_air_date.desc' : 'primary_release_date.desc') : 'popularity.desc';
    if(boxoffice) sort = 'revenue.desc';
    if(sortKey==='popular') sort='popularity.desc';
    else if(sortKey==='rating') sort='vote_average.desc';
    else if(sortKey==='newest') sort = media==='tv' ? 'first_air_date.desc' : 'primary_release_date.desc';
    else if(sortKey==='oldest') sort = media==='tv' ? 'first_air_date.asc' : 'primary_release_date.asc';
    let u = `${BASE}/discover/${media}?api_key=${API_KEY}&language=${LANG}&sort_by=${sort}&include_adult=false&page=${page}`;
    if(latest){ const today=new Date().toISOString().slice(0,10); u += media==='tv' ? `&first_air_date.lte=${today}&vote_count.gte=10` : `&primary_release_date.lte=${today}&vote_count.gte=10`; }
    if(boxoffice){ const today=new Date().toISOString().slice(0,10); const _s=new Date(); _s.setFullYear(_s.getFullYear()-2); const since=_s.toISOString().slice(0,10); u += `&primary_release_date.gte=${since}&primary_release_date.lte=${today}&vote_count.gte=50`; }
    if(provider){ u += `&with_watch_providers=${provider}&watch_region=${WATCH_REGION}`; }
    if(sortKey==='rating') u += `&vote_count.gte=200`;
    if(genre) u += `&with_genres=${genre}`;
    if(lang) u += `&with_original_language=${lang}`;
    return u;
  }
  const detailURL = (media,id) => `${BASE}/${media}/${id}?api_key=${API_KEY}&language=${LANG}`;
  const detailEnURL = (media,id) => `${BASE}/${media}/${id}?api_key=${API_KEY}&language=en-US`;
  const searchURL = q => `${BASE}/search/multi?api_key=${API_KEY}&language=${LANG}&query=${encodeURIComponent(q)}`;
  const detailFullURL = (media,id) => `${BASE}/${media}/${id}?api_key=${API_KEY}&language=${LANG}&append_to_response=credits,videos,recommendations`;
  const seasonURL = (id,sn) => `${BASE}/tv/${id}/season/${sn}?api_key=${API_KEY}&language=${LANG}`;
  const PROFILE_IMG = 'https://image.tmdb.org/t/p/w185';
  const STILL_IMG = 'https://image.tmdb.org/t/p/w300';
  function pickTrailer(videos){ const arr=(videos&&videos.results)||[]; const yt=arr.filter(v=>v.site==='YouTube'); return (yt.find(v=>v.type==='Trailer')||yt.find(v=>v.type==='Teaser')||yt[0])||null; }
  const _legacyPlayerURL = (media,id) => media==='tv' ? `https://vidsrc.me/embed/tv?tmdb=${id}` : `https://vidsrc.me/embed/movie?tmdb=${id}`;

  // ===== SUBTITLE / PLAYER SRC =====
  const SUB_LANGS = {id:'Indonesia',en:'English',ko:'Korea',ja:'Jepang',th:'Thailand',es:'Spanyol',fr:'Prancis',ar:'Arab',off:'Mati'};
  let subLang = localStorage.getItem('notflix_sublang') || 'id';
  const SOURCES = {
    vidsrc:{ label:'VidSrc', movie:function(id){ return 'https://vidsrc.me/embed/movie?tmdb='+id+'&ds_lang=id'; }, tv:function(id,s,e){ return 'https://vidsrc.me/embed/tv?tmdb='+id+'&season='+s+'&episode='+e+'&ds_lang=id'; } },
    vidlink:{ label:'VidLink', movie:function(id){ return 'https://vidlink.pro/movie/'+id; }, tv:function(id,s,e){ return 'https://vidlink.pro/tv/'+id+'/'+s+'/'+e; } },
    vidfast:{ label:'VidFast', movie:function(id){ return 'https://vidfast.pro/movie/'+id; }, tv:function(id,s,e){ return 'https://vidfast.pro/tv/'+id+'/'+s+'/'+e; } },
  };
  let source = localStorage.getItem('notflix_source') || 'vidsrc';
  const psrc = (media,id,season,episode) => {
    const src = SOURCES[source] || SOURCES.vidsrc;
    if(media==='tv') return src.tv(id, season||1, episode||1);
    return src.movie(id);
  };

  // ===== NORMALISASI DATA (movie & tv jadi satu bentuk) =====
  function normalize(item,media){
    const m = media || item.media_type || 'movie';
    return {
      id:item.id, media:m,
      title:item.title || item.name || 'Tanpa Judul',
      poster_path:item.poster_path, backdrop_path:item.backdrop_path,
      vote_average:item.vote_average || 0,
      date:item.release_date || item.first_air_date || '',
      overview:item.overview || '',
      original_language:item.original_language,
      origin_country:item.origin_country || [],
    };
  }
  function passFilters(it){
    if(BLOCKED_LANGS.includes(it.original_language)) return false;
    if(Array.isArray(it.origin_country) && it.origin_country.includes(BLOCKED_COUNTRY)) return false;
    return true;
  }
  function dedupe(list){
    const seen=new Set(); const out=[];
    for(const it of list){const k=it.media+'-'+it.id; if(seen.has(k))continue; seen.add(k); out.push(it);}
    return out;
  }
  const currentMedias = () => state.media==='all' ? ['movie','tv'] : [state.media];

  // ===== WATCHLIST =====
  const getWatchlist = () => JSON.parse(localStorage.getItem('notflix_watchlist')) || [];
  const isSaved = (id,media) => getWatchlist().some(m => m.id===id && m.media===media);
  function toggleSave(it){
    let wl = getWatchlist();
    if(isSaved(it.id,it.media)) wl = wl.filter(m => !(m.id===it.id && m.media===it.media));
    else wl.push(it);
    localStorage.setItem('notflix_watchlist', JSON.stringify(wl));
  }

  // ===== LANJUTKAN MENONTON =====
  function getContinue(){ try{return JSON.parse(localStorage.getItem('notflix_continue'))||[];}catch(e){return [];} }
  function recordContinue(it,season,episode){
    if(!it||!it.id) return;
    let list=getContinue().filter(x=>!(x.id===it.id && x.media===it.media));
    const entry={id:it.id,media:it.media,title:it.title,poster_path:it.poster_path,backdrop_path:it.backdrop_path,vote_average:it.vote_average,date:it.date,overview:it.overview,original_language:it.original_language,origin_country:it.origin_country,ts:Date.now()};
    if(it.media==='tv'){ entry.season=season||1; entry.episode=episode||1; }
    list.unshift(entry);
    localStorage.setItem('notflix_continue', JSON.stringify(list.slice(0,20)));
  }
  function getResume(media,id){ return getContinue().find(x=>x.id===id && x.media===media)||null; }

  // ===== AMBIL ITEM UNTUK SATU BARIS =====
  async function fetchRowItems(def){
    const region = REGIONS[state.region];
    if(def.trending && state.region==='all' && state.provider==='all' && !def.genre){
      if(state.media==='all'){
        const data = await fetchJSON(trendingURL('all')).catch(()=>({results:[]}));
        return dedupe((data.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv').map(r=>normalize(r))).filter(passFilters);
      }
      const data = await fetchJSON(trendingURL(state.media)).catch(()=>({results:[]}));
      return dedupe((data.results||[]).map(r=>normalize(r,state.media))).filter(passFilters);
    }
    const medias = def.boxoffice ? ['movie'] : currentMedias();
    const datas = await Promise.all(medias.map(media =>
      fetchJSON(discoverURL(media,{genre:def.genre?def.genre[media]:null,lang:region.lang,page:1,latest:def.latest,boxoffice:def.boxoffice,provider:state.provider==='all'?null:PROVIDERS[state.provider].id})).catch(()=>({results:[]}))
    ));
    let items = [];
    datas.forEach((d,i)=>{(d.results||[]).forEach(r=>items.push(normalize(r,medias[i])));});
    let out = dedupe(items.filter(passFilters));
    if(def.latest || def.boxoffice) out = out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    return out;
  }

  // ===== KARTU =====
  function cardHTML(it){
    const year = (it.date||'').slice(0,4);
    const match = Math.round((it.vote_average||0)*10);
    const saved = isSaved(it.id,it.media) ? 'saved' : '';
    const badge = it.media==='tv' ? '<span class="type-badge">SERIES</span>' : '<span class="type-badge film">FILM</span>';
    return `
      <div class="card" data-id="${it.id}" data-media="${it.media}">
        <div class="card-poster">
          <img src="${IMG + it.poster_path}" alt="${it.title}" loading="lazy">
          ${badge}
        </div>
        <div class="card-info">
          <h3>${it.title}</h3>
          <div class="card-actions">
            <button class="icon-btn play" title="Putar"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="icon-btn save ${saved}" title="Daftar Saya"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
            <button class="icon-btn info" title="Info" style="margin-left:auto"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
          </div>
          <div class="card-meta"><span class="match">${match}% cocok</span>${year?`<span>${year}</span>`:''}</div>
          ${it.overview?`<p class="card-overview">${it.overview}</p>`:''}
        </div>
      </div>`;
  }

  function bindCard(el,it){
    movieCache[it.media+'-'+it.id]=it;
    el.querySelector('img').onclick=()=>openDetail(it.media,it.id);
    el.querySelector('.play').onclick=e=>{e.stopPropagation();openPlayer(it.media,it.id);};
    el.querySelector('.info').onclick=e=>{e.stopPropagation();openDetail(it.media,it.id);};
    const sb=el.querySelector('.save');
    sb.onclick=e=>{e.stopPropagation();toggleSave(it);sb.classList.toggle('saved');};
  }

  // ===== HERO / BILLBOARD =====
  async function renderHero(it){
    if(!it){hero.style.display='none';return;}
    hero.style.display='flex';
    const bg = it.backdrop_path ? BACKDROP+it.backdrop_path : (it.poster_path ? IMG+it.poster_path : '');
    hero.style.backgroundImage = `url('${bg}')`;
    const year = (it.date||'').slice(0,4);
    const match = Math.round((it.vote_average||0)*10);
    let overview = it.overview;
    if(!overview){ try{ const en = await fetchJSON(detailEnURL(it.media,it.id)); overview = en.overview; }catch(e){} }
    if(!overview) overview = 'Deskripsi belum tersedia untuk judul ini.';
    const typeLabel = it.media==='tv' ? 'SERIES' : 'FILM';
    hero.innerHTML = `
      <div class="hero-content">
        <div class="hero-tag">${typeLabel}</div>
        <h1 class="hero-title">${it.title||''}</h1>
        <div class="hero-meta">
          <span class="match">${match}% cocok</span>
          ${year?`<span>${year}</span>`:''}
          <span>⭐ ${(it.vote_average||0).toFixed(1)}</span>
        </div>
        <p class="hero-overview">${overview}</p>
        <div class="hero-buttons">
          <button class="btn btn-play"><svg viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg> Putar</button>
          <button class="btn btn-info"><svg viewBox="0 0 24 24" fill="#fff"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg> Info Selengkapnya</button>
        </div>
      </div>`;
    hero.querySelector('.btn-play').onclick=()=>openPlayer(it.media,it.id);
    hero.querySelector('.btn-info').onclick=()=>openDetail(it.media,it.id);
  }

  // ===== BARIS (carousel) =====
  function buildRow(def,items){
    const valid = items.filter(m=>m.poster_path);
    if(!valid.length) return null;
    const row = document.createElement('section');
    row.className='row';
    row.innerHTML = `
      <div class="row-head">
        <h2 class="row-title">${def.label}</h2>
        ${def.continueRow?'':'<button class="more-btn-inline">Lihat Semua <span>›</span></button>'}
      </div>
      <div class="row-slider-wrap">
        <button class="slider-arrow left">‹</button>
        <div class="row-slider"></div>
        <button class="slider-arrow right">›</button>
      </div>`;
    const slider = row.querySelector('.row-slider');
    const list = def.top10 ? valid.slice(0,10) : valid;
    list.forEach((it,i)=>{
      if(def.top10){
        const wrap=document.createElement('div');
        wrap.className='top-card';
        wrap.innerHTML=`<span class="top-rank">${i+1}</span>`+cardHTML(it);
        bindCard(wrap.querySelector('.card'),it);
        slider.appendChild(wrap);
      } else {
        const tmp=document.createElement('div');
        tmp.innerHTML=cardHTML(it);
        const card=tmp.firstElementChild;
        bindCard(card,it);
        slider.appendChild(card);
      }
    });
    row.querySelector('.left').onclick=()=>slider.scrollBy({left:-slider.clientWidth*0.85,behavior:'smooth'});
    row.querySelector('.right').onclick=()=>slider.scrollBy({left:slider.clientWidth*0.85,behavior:'smooth'});
    const moreBtn=row.querySelector('.more-btn-inline'); if(moreBtn) moreBtn.onclick=()=>openCategory(def);
    return row;
  }

  // ===== GRID =====
  function buildGridEl(items){
    const grid=document.createElement('div');
    grid.className='grid';
    const valid=dedupe(items).filter(m=>m.poster_path);
    valid.forEach(it=>{
      const tmp=document.createElement('div');
      tmp.innerHTML=cardHTML(it);
      const card=tmp.firstElementChild;
      bindCard(card,it);
      grid.appendChild(card);
    });
    return {grid,count:valid.length};
  }

  // ===== BERANDA =====
  async function loadHome(){
    state.tab='home'; setActiveNav(); setHash('#home');
    hero.style.display='flex';
    rowsWrap.classList.remove('pushed');
    rowsWrap.innerHTML='<div class="spinner"></div>';
    try{
      const defs=[
        {label:'🔥 Sedang Tren',trending:true},
        {label:'🏆 Top 10 Hari Ini',trending:true,top10:true},
        {label:'⭐ Populer Saat Ini'},
        {label:'🆕 Rilis Terbaru',latest:true},
        {label:'💰 Box Office',boxoffice:true},
        ...GENRES.map(g=>({label:g.label,genre:g})),
      ];
      const lists=await Promise.all(defs.map(d=>fetchRowItems(d)));
      const heroPool=(lists[0]||[]).filter(m=>m.backdrop_path);
      renderHero(heroPool[Math.floor(Math.random()*Math.min(6,heroPool.length||1))]||heroPool[0]);
      rowsWrap.innerHTML='';
      const cont=getContinue().filter(it=> state.media==='all'||it.media===state.media).filter(m=>m.poster_path);
      if(cont.length){ const cr=buildRow({label:'▶ Lanjutkan Menonton',continueRow:true},cont); if(cr) rowsWrap.appendChild(cr); }
      defs.forEach((d,i)=>{const r=buildRow(d,lists[i]);if(r)rowsWrap.appendChild(r);});
      if(!rowsWrap.children.length) rowsWrap.innerHTML='<div class="message">Tidak ada judul untuk filter ini. Coba ubah filter Tipe atau Wilayah.</div>';
    }catch(e){
      console.error(e);
      rowsWrap.innerHTML='<div class="message">Gagal memuat. Pastikan API Key TMDB valid dan koneksi internet lancar.</div>';
    }
  }

  // ===== KATEGORI (Lihat Semua / klik genre) =====
  async function openCategory(def){
    state.tab='category'; state.catDef=def; state.catPage=1; state.catItems=[]; state.sort='default';
    setActiveNav();
    if(def.key) setHash('#genre/'+def.key.replace(/^g_/,'')); else setHash('#category');
    hero.style.display='none';
    rowsWrap.classList.add('pushed');
    rowsWrap.innerHTML=`
      <div class="cat-head"><button class="back-btn" id="cat-back">‹ Kembali</button><h2 class="cat-title">${def.label}</h2></div>
      <div class="grid" id="cat-grid"></div>
      <div class="spinner" id="cat-spin"></div>
      <div class="more-wrap"><button class="more-btn" id="load-more">Muat Lebih Banyak</button></div>`;
    document.getElementById('cat-back').onclick=()=>loadHome();
    document.getElementById('load-more').onclick=()=>loadMoreCategory();
    const _ch=rowsWrap.querySelector('.cat-head'); if(_ch){ const ss=document.createElement('select'); ss.className='sort-sel'; ss.id='sort-sel'; ss.innerHTML='<option value="default">Urutkan: Relevan</option><option value="popular">Terpopuler</option><option value="rating">Rating Tertinggi</option><option value="newest">Terbaru</option><option value="oldest">Terlama</option>'; ss.value=state.sort; ss.onchange=()=>{ state.sort=ss.value; state.catPage=1; state.catItems=[]; loadMoreCategory(); }; _ch.appendChild(ss); }
    window.scrollTo({top:0,behavior:'smooth'});
    await loadMoreCategory();
  }
  async function loadMoreCategory(){
    const def=state.catDef; const region=REGIONS[state.region];
    const spin=document.getElementById('cat-spin'); if(spin)spin.style.display='block';
    const medias=def.boxoffice ? ['movie'] : currentMedias();
    const sortKey=(state.sort && state.sort!=='default') ? state.sort : null;
    const datas=await Promise.all(medias.map(media=>
      fetchJSON(discoverURL(media,{genre:def.genre?def.genre[media]:null,lang:region.lang,page:state.catPage,latest:def.latest,boxoffice:def.boxoffice,provider:state.provider==='all'?null:PROVIDERS[state.provider].id,sortKey})).catch(()=>({results:[]}))
    ));
    datas.forEach((d,i)=>{(d.results||[]).forEach(r=>state.catItems.push(normalize(r,medias[i])));});
    state.catPage++;
    state.catItems=dedupe(state.catItems).filter(passFilters);
    if((def.latest || def.boxoffice) && !sortKey) state.catItems=state.catItems.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const grid=document.getElementById('cat-grid');
    if(grid){
      grid.innerHTML='';
      state.catItems.filter(m=>m.poster_path).forEach(it=>{
        const tmp=document.createElement('div');
        tmp.innerHTML=cardHTML(it);
        const card=tmp.firstElementChild;
        bindCard(card,it);
        grid.appendChild(card);
      });
    }
    if(spin)spin.style.display='none';
  }

  // ===== PENCARIAN =====
  async function doSearch(q){
    state.tab='search'; state.query=q; setActiveNav(); setHash('#search/'+encodeURIComponent(q));
    hero.style.display='none'; rowsWrap.classList.add('pushed');
    rowsWrap.innerHTML='<div class="spinner"></div>';
    try{
      const data=await fetchJSON(searchURL(q));
      let items=(data.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv').map(r=>normalize(r));
      if(state.media!=='all') items=items.filter(it=>it.media===state.media);
      items=items.filter(passFilters);
      rowsWrap.innerHTML=`<div class="cat-head"><h2 class="cat-title">Hasil untuk: "${q}"</h2></div>`;
      const {grid,count}=buildGridEl(items);
      if(!count) rowsWrap.innerHTML+='<div class="message">Tidak ada hasil.</div>';
      else rowsWrap.appendChild(grid);
    }catch(e){
      rowsWrap.innerHTML='<div class="message">Pencarian gagal.</div>';
    }
  }

  // ===== DAFTAR SAYA =====
  function showWatchlist(){
    state.tab='watchlist'; setActiveNav(); setHash('#watchlist');
    hero.style.display='none'; rowsWrap.classList.add('pushed');
    let items=getWatchlist();
    if(state.media!=='all') items=items.filter(it=>it.media===state.media);
    rowsWrap.innerHTML=`<div class="cat-head"><h2 class="cat-title">Daftar Saya</h2></div>`;
    const {grid,count}=buildGridEl(items);
    if(!count) rowsWrap.innerHTML+='<div class="message">Daftar Saya masih kosong. Tambahkan film atau series dengan tombol +.</div>';
    else rowsWrap.appendChild(grid);
  }

  // ===== MODAL DETAIL =====
  async function openDetail(media,id){
    let full=null;
    setHash('#detail/'+media+'/'+id);
    try{ full=await fetchJSON(detailFullURL(media,id)); }catch(e){}
    let it = full ? normalize(full,media) : movieCache[media+'-'+id];
    if(!it) return;
    movieCache[media+'-'+id]=it;
    let overview=it.overview;
    if(!overview){ try{ const en=await fetchJSON(detailEnURL(media,id)); overview=en.overview; }catch(e){} }
    full = full || {};
    const bg = it.backdrop_path ? BACKDROP+it.backdrop_path : IMG+it.poster_path;
    const year=(it.date||'').slice(0,4);
    const match=Math.round((it.vote_average||0)*10);
    let extra='';
    if(media==='movie' && full.runtime) extra=`${Math.floor(full.runtime/60)}j ${full.runtime%60}m`;
    if(media==='tv' && full.number_of_seasons) extra=`${full.number_of_seasons} Musim`;
    const genreNames=(full.genres||[]).map(g=>g.name).join(' • ');
    const typeLabel = media==='tv' ? 'Series' : 'Film';
    modalInner.innerHTML=`
      <div class="modal-hero" style="background-image:url('${bg}')">
        <div class="modal-hero-content">
          <h2>${it.title}</h2>
          <button class="btn btn-play" id="modal-play"><svg viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg> Putar</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <span class="match">${match}% cocok</span>
          ${year?`<span>${year}</span>`:''}
          ${extra?`<span>${extra}</span>`:''}
          <span class="tag">HD</span>
          <span class="tag">${typeLabel}</span>
          <span>⭐ ${(it.vote_average||0).toFixed(1)}</span>
        </div>
        <p class="modal-overview">${overview||'Tidak ada deskripsi.'}</p>
        ${genreNames?`<p class="modal-genres">Genre: ${genreNames}</p>`:''}
      </div>`;
    document.getElementById('modal-play').onclick=()=>openPlayer(media,id);
    enrichDetail(media,id,full);
    modal.classList.add('open');
    document.body.style.overflow='hidden';
  }

  // ===== DETAIL: PEMERAN, EPISODE, REKOMENDASI =====
  async function enrichDetail(media,id,full){
    if(!full) return;
    const heroC=modalInner.querySelector('.modal-hero-content');
    const trailer=pickTrailer(full.videos);
    if(trailer && heroC){
      const tb=document.createElement('button');
      tb.className='btn btn-info'; tb.style.marginTop='10px';
      tb.innerHTML=`<svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg> Trailer`;
      tb.onclick=()=>{ const mh=modalInner.querySelector('.modal-hero'); if(mh){ mh.innerHTML=`<iframe class="modal-player" src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`; mh.style.background='#000'; } };
      heroC.appendChild(tb);
    }
    const body=modalInner.querySelector('.modal-body');
    if(!body) return;
    const cast=((full.credits&&full.credits.cast)||[]).slice(0,12);
    if(cast.length){
      const sec=document.createElement('div');
      sec.innerHTML=`<h3 class="modal-sec-title">Pemeran</h3><div class="cast-row">${cast.map(c=>`<div class="cast-item"><img src="${c.profile_path?PROFILE_IMG+c.profile_path:''}" alt="" loading="lazy" onerror="this.style.visibility='hidden'"><div class="nm">${c.name}</div><div class="ch">${c.character||''}</div></div>`).join('')}</div>`;
      body.appendChild(sec);
    }
    if(media==='tv'){
      const sec=document.createElement('div');
      sec.innerHTML=`<h3 class="modal-sec-title">Episode</h3>`;
      const area=document.createElement('div'); sec.appendChild(area);
      body.appendChild(sec);
      loadEpisodes(id, full, area);
    }
    const recs=((full.recommendations&&full.recommendations.results)||[]).map(r=>normalize(r,r.media_type||media)).filter(passFilters).filter(m=>m.poster_path).slice(0,12);
    if(recs.length){
      const sec=document.createElement('div');
      sec.innerHTML=`<h3 class="modal-sec-title">Mirip Ini</h3>`;
      const rg=document.createElement('div'); rg.className='rec-grid';
      recs.forEach(rit=>{ const tmp=document.createElement('div'); tmp.innerHTML=cardHTML(rit); const card=tmp.firstElementChild; bindCard(card,rit); rg.appendChild(card); });
      sec.appendChild(rg);
      body.appendChild(sec);
    }
  }
  async function loadEpisodes(id, full, area){
    if(!area) return;
    const seasons=((full.seasons)||[]).filter(s=>s.season_number>=1);
    const segList=seasons.length?seasons:[{season_number:1}];
    area.innerHTML=`<select class="ep-season-sel" id="det-season">${segList.map(s=>`<option value="${s.season_number}">Musim ${s.season_number}</option>`).join('')}</select><div class="ep-list" id="det-ep-list"><div class="spinner"></div></div>`;
    const sel=area.querySelector('#det-season');
    const listEl=area.querySelector('#det-ep-list');
    const renderSeason=async(sn)=>{
      listEl.innerHTML=`<div class="spinner"></div>`;
      let data={};
      try{ data=await fetchJSON(seasonURL(id,sn)); }catch(e){}
      const eps=(data.episodes)||[];
      if(!eps.length){ listEl.innerHTML=`<div class="message">Daftar episode tidak tersedia.</div>`; return; }
      listEl.innerHTML='';
      eps.forEach(ep=>{
        const div=document.createElement('div');
        div.className='ep-item';
        const still=ep.still_path?STILL_IMG+ep.still_path:(full.backdrop_path?BACKDROP+full.backdrop_path:'');
        div.innerHTML=`<img class="ep-still" src="${still}" alt="" loading="lazy" onerror="this.style.visibility='hidden'"><div class="ep-info"><h4><span class="ep-num">${ep.episode_number}</span>${ep.name||'Episode '+ep.episode_number}</h4><p>${ep.overview||''}</p></div>`;
        div.onclick=()=>openPlayer('tv',id,sn,ep.episode_number);
        listEl.appendChild(div);
      });
    };
    sel.onchange=()=>renderSeason(sel.value);
    renderSeason(segList[0].season_number);
  }

  // ===== MODAL PLAYER =====
  function openPlayer(media,id,startSeason,startEpisode){
    setHash('#watch/'+media+'/'+id);
    modalInner.innerHTML=`
      <div class="player-wrap" id="player-wrap">
        <div class="player-bar" id="player-bar">
        <div class="player-ctrl" style="display:none"><select id="sub-lang"></select><span id="sub-hint" class="sub-hint"></span></div>
        <div class="player-ctrl"><span>Sumber</span><select id="src-sel"></select></div>
        <div class="player-ctrl" id="ep-ctrl" style="display:none"><span>S</span><select id="season-sel"></select><span>E</span><select id="ep-sel"></select></div>
        <button class="fs-btn" id="fs-btn" title="Layar Penuh"><svg viewBox="0 0 24 24" fill="#fff"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        <button class="fs-btn" id="player-close" title="Tutup"><svg viewBox="0 0 24 24" fill="#fff"><path d="M18.3 5.71L12 12.01l-6.3-6.3-1.42 1.42 6.3 6.3-6.3 6.3 1.42 1.42 6.3-6.3 6.3 6.3 1.42-1.42-6.3-6.3 6.3-6.3z"/></svg></button>
        </div>
        <iframe class="modal-player" id="player-frame" src="${psrc(media,id)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
      </div>`;
    modal.classList.add('open','player-mode');
    document.body.style.overflow='hidden';
    const wrap=document.getElementById('player-wrap');
    const frame=document.getElementById('player-frame');
    const subSel=document.getElementById('sub-lang');
    const srcSel=document.getElementById('src-sel');
    const epCtrl=document.getElementById('ep-ctrl');
    const seasonSel=document.getElementById('season-sel');
    const epSel=document.getElementById('ep-sel');
    let curSeason=1, curEpisode=1;
    const baseItem = movieCache[media+'-'+id] || {id:Number(id),media:media};
    const _resume=getResume(media,id);
    if(media==='tv'){ curSeason = Number(startSeason)||(_resume&&_resume.season)||1; curEpisode = Number(startEpisode)||(_resume&&_resume.episode)||1; }
    const reloadFrame=()=>{ frame.src = psrc(media,id,curSeason,curEpisode); recordContinue(baseItem,curSeason,curEpisode); };
    if(media==='tv' && (curSeason!==1||curEpisode!==1)) frame.src = psrc(media,id,curSeason,curEpisode);
    recordContinue(baseItem,curSeason,curEpisode);
    srcSel.innerHTML=Object.entries(SOURCES).map(([k,v])=>`<option value="${k}"${k===source?' selected':''}>${v.label}</option>`).join('');
    srcSel.onchange=e=>{ source=e.target.value; localStorage.setItem('notflix_source',source); reloadFrame(); };
    if(media==='tv'){
      epCtrl.style.display='flex';
      fetchJSON(detailURL('tv',id)).then(d=>{
        const seasons=(d.seasons||[]).filter(s=>s.season_number>=1);
        const segList=seasons.length?seasons:[{season_number:1,episode_count:30}];
        seasonSel.innerHTML=segList.map(s=>`<option value="${s.season_number}">Musim ${s.season_number}</option>`).join('');
        const fillEps=(sn)=>{ const so=segList.find(x=>String(x.season_number)===String(sn)); const cnt=(so&&so.episode_count)?so.episode_count:30; let o=''; for(let i=1;i<=cnt;i++) o+=`<option value="${i}">Eps ${i}</option>`; epSel.innerHTML=o; };
        if(!segList.find(x=>String(x.season_number)===String(curSeason))){ curSeason=segList[0].season_number; curEpisode=1; }
        fillEps(curSeason);
        seasonSel.value=String(curSeason); epSel.value=String(curEpisode);
        seasonSel.onchange=()=>{ curSeason=seasonSel.value; curEpisode=1; fillEps(curSeason); epSel.value='1'; reloadFrame(); };
        epSel.onchange=()=>{ curEpisode=epSel.value; reloadFrame(); };
      }).catch(()=>{});
    }
    const bar=document.getElementById('player-bar');
    let uiTimer;
    const showUI=()=>{ modal.classList.remove('ui-idle'); clearTimeout(uiTimer); uiTimer=setTimeout(()=>modal.classList.add('ui-idle'),3000); };
    wrap.addEventListener('mousemove',showUI);
    if(bar){ bar.addEventListener('mouseenter',showUI); bar.addEventListener('mousemove',showUI); }
    showUI();
    const pc=document.getElementById('player-close'); if(pc) pc.onclick=()=>closeModal();
    subSel.innerHTML=Object.entries(SUB_LANGS).map(([k,v])=>`<option value="${k}"${k===subLang?' selected':''}>${v}</option>`).join('');
    subSel.onchange=e=>{ subLang=e.target.value; localStorage.setItem('notflix_sublang',subLang); const h=document.getElementById('sub-hint'); if(h){ h.textContent='✓ berlaku saat buka video / pakai CC'; clearTimeout(window._subHintT); window._subHintT=setTimeout(()=>{h.textContent='';},3500); } };
    document.getElementById('fs-btn').onclick=()=>{
      const inFs=document.fullscreenElement||document.webkitFullscreenElement;
      if(!inFs){ const req=wrap.requestFullscreen||wrap.webkitRequestFullscreen||wrap.msRequestFullscreen; if(req)req.call(wrap); }
      else { const exit=document.exitFullscreen||document.webkitExitFullscreen; if(exit)exit.call(document); }
    };
  }

  function closeModal(fromRouter){
    if(document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
    modal.classList.remove('open','player-mode','ui-idle');
    modalInner.innerHTML='';
    document.body.style.overflow='auto';
    if(fromRouter!==true){ const h=location.hash; if(h.indexOf('#detail/')===0||h.indexOf('#watch/')===0) history.back(); }
  }

    spb.onclick=()=>{ closeSearch(); const fb=document.getElementById('filter-bar'); const ft=document.getElementById('filter-toggle'); if(fb) fb.classList.remove('open'); if(ft) ft.classList.remove('active'); document.body.classList.remove('filters-open'); loadSports(); window.scrollTo({top:0,behavior:'smooth'}); };

  function refreshSeg(){
    mediaSeg.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.media===state.media));
    regionSeg.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.region===state.region));
    providerSeg.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.provider===state.provider));
  }
  function setActiveNav(){
    document.querySelectorAll('.sportseg .seg-btn').forEach(b=>b.classList.toggle('active',state.tab==='sports'));
    mainNav.querySelectorAll('button').forEach(b=>{
      let active=false;
      if(state.tab==='home' && b.dataset.key==='home') active=true;
      if(state.tab==='watchlist' && b.dataset.key==='watchlist') active=true;
      if(state.tab==='category' && state.catDef && state.catDef.key && b.dataset.key===state.catDef.key) active=true;
      b.classList.toggle('active',active);
    });

  function applyFilters(){
    if(state.tab==='sports') return loadSports();
    if(state.tab==='search') doSearch(state.query);
    else if(state.tab==='watchlist') showWatchlist();
    else if(state.tab==='category') openCategory(state.catDef);
    else loadHome();
  }
  function closeSearch(){ searchInput.value=''; searchContainer.classList.remove('open'); }

  // ===== STREAMING BOLA: DAFTAR & PEMUTAR =====
  async function loadSports(){
    state.tab='sports'; setActiveNav(); setHash('#sports');
    hero.style.display='none'; rowsWrap.classList.add('pushed');
    rowsWrap.innerHTML='<div class="cat-head"><h2 class="cat-title">⚽ Streaming Bola — Live</h2></div><div class="spinner"></div>';
    try{
      let matches=[];
      try{ matches=await fetchJSON(SPORT_API+'/api/matches/football'); }
      catch(_e){ matches=await fetchJSON(SPORT_API+'/api/matches/live'); }
      matches=(matches||[]).filter(m=>m && m.sources && m.sources.length);
      matches.sort((a,b)=>(a.date||0)-(b.date||0));
      rowsWrap.innerHTML='<div class="cat-head"><h2 class="cat-title">⚽ Streaming Bola — Live</h2></div>';
      if(!matches.length){ rowsWrap.innerHTML+='<div class="message">Tidak ada pertandingan yang tersedia saat ini. Coba lagi nanti.</div>'; return; }
      const grid=document.createElement('div'); grid.className='sport-grid';
      const now=Date.now();
      matches.forEach(m=>{
        const poster = m.poster ? (String(m.poster).indexOf('http')===0 ? m.poster : SPORT_API+m.poster) : '';
        const isLive = m.date && now>=m.date && now <= m.date + 3*60*60*1000;
        const start = m.date ? new Date(m.date) : null;
        const time = start ? start.toLocaleString('id-ID',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
        const home = m.teams && m.teams.home, away = m.teams && m.teams.away;
        const title = m.title || (((home&&home.name)||'?')+' vs '+((away&&away.name)||'?'));
        const card=document.createElement('div'); card.className='sport-card';
        card.innerHTML=`<div class="sport-poster">${poster?`<img src="${poster}" alt="" loading="lazy" onerror="this.style.display='none'">`:'<span class="sport-noimg">⚽</span>'}${isLive?'<span class="live-badge">● LIVE</span>':''}</div><div class="sport-info"><h3>${title}</h3>${time?`<div class="sport-time">${time}</div>`:''}</div>`;
        card.onclick=()=>openSportPlayer(m,title);
        grid.appendChild(card);
      });
      rowsWrap.appendChild(grid);
    }catch(e){
      rowsWrap.innerHTML='<div class="cat-head"><h2 class="cat-title">⚽ Streaming Bola — Live</h2></div><div class="message">Gagal memuat jadwal pertandingan. Sumber bola pihak ketiga mungkin berubah / diblokir — perbarui SPORT_API di kode (mis. streamed.su / streamed.st).</div>';
    }
  }
  async function openSportPlayer(m,title){
    modalInner.innerHTML='<div class="player-wrap" id="player-wrap"><div class="player-bar" id="player-bar"><div class="player-ctrl"><span>Sumber</span><select id="sp-src"></select></div><div class="player-ctrl"><span>Server</span><select id="sp-stream"></select></div><button class="fs-btn" id="fs-btn" title="Layar Penuh"><svg viewBox="0 0 24 24" fill="#fff"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button><button class="fs-btn" id="player-close" title="Tutup"><svg viewBox="0 0 24 24" fill="#fff"><path d="M18.3 5.71L12 12.01l-6.3-6.3-1.42 1.42 6.3 6.3-6.3 6.3 1.42 1.42 6.3-6.3 6.3 6.3 1.42-1.42-6.3-6.3 6.3-6.3z"/></svg></button></div><iframe class="modal-player" id="player-frame" src="about:blank" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe></div>';

    const setStreams=async(idx)=>{

      try{ streams=await fetchJSON(SPORT_API+'/api/stream/'+s.source+'/'+s.id); }catch(e){ streams=[]; }

      frame.src=embedOf(s,streams[0]);
    };
    srcSel.onchange=()=>setStreams(Number(srcSel.value));

  // ===== ROUTING (hash) =====
  function setHash(h){ if(location.hash===h) return; suppressRoute=true; location.hash=h; }
  function router(){
    const h=location.hash.replace(/^#/,'');
    const parts=h.split('/').map(s=>{try{return decodeURIComponent(s);}catch(e){return s;}});
    if(parts[0]==='detail' && parts[1] && parts[2]){ openDetail(parts[1],parts[2]); return; }
    if(parts[0]==='watch' && parts[1] && parts[2]){ openPlayer(parts[1],parts[2]); return; }
    if(modal.classList.contains('open')) closeModal(true);
    if(parts[0]==='search' && parts[1]){ searchContainer.classList.add('open'); searchInput.value=parts[1]; doSearch(parts[1]); return; }
    if(parts[0]==='watchlist'){ showWatchlist(); return; }
    if(parts[0]==='sports'){ loadSports(); return; }
    if(parts[0]==='genre' && parts[1]){ const g=GENRES.find(x=>x.key===parts[1]); if(g){ openCategory({label:g.label,genre:g,key:'g_'+g.key}); return; } }
    loadHome();
  }
  window.addEventListener('hashchange',()=>{ if(suppressRoute){ suppressRoute=false; return; } router(); });

  // ===== MULAI =====
  buildControls();
  const _initHash=location.hash;
  loadHome();
  if(_initHash && _initHash!=='#home' && _initHash!=='#' && _initHash!==''){ suppressRoute=true; location.hash=_initHash; router(); }
</script>
</body>
</html>
