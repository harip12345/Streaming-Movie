<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Film Populer dengan Pencarian & Player</title>
    <style>
        /* === Variabel Warna ala Netflix === */
        :root {
            --bg-color: #141414;
            --card-bg: #2f2f2f;
            --text-color: #e5e5e5;
            --primary-color: #e50914; 
            --rating-color: #46d369; 
        }

        /* === Reset & Base Styles === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* === Header & Navigasi === */
        header {
            padding: 20px 4% 0;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Membuat logo di kiri, search di kanan */
            height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0));
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        header h1:hover {
            transform: scale(1.05);
        }

        /* === Kolom Pencarian === */
        .search-container input {
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            width: 200px;
            transition: width 0.4s ease, border-color 0.3s ease, background-color 0.3s ease;
        }

        .search-container input:focus {
            width: 280px;
            border-color: var(--primary-color);
            background-color: rgba(0, 0, 0, 0.9);
        }

        .search-container input::placeholder {
            color: #aaa;
        }

        /* === Main Container === */
        main {
            padding: 30px 4%;
        }

        main h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* === CSS Grid untuk Katalog Film === */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* === Movie Card Styles === */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 15px;
            background: linear-gradient(to top, #181818 0%, transparent 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .movie-info {
            opacity: 1;
        }

        .movie-info h3 {
            margin: 0;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .rating {
            color: var(--rating-color);
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* === Pesan Error/Loading === */
        .message {
            text-align: center;
            font-size: 1.2rem;
            color: #999;
            grid-column: 1 / -1;
            padding: 40px;
        }

        /* === MODAL POP-UP STYLES === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="logo">Notflix</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari judul film...">
        </div>
    </header>

    <main>
        <h2 id="section-title">Sedang Tren Sekarang</h2>
        <div id="movie-grid" class="movie-grid">
            <div class="message">Memuat data film...</div>
        </div>
    </main>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span id="close-btn" class="close-btn">&times; Tutup</span>
            <div id="player-container" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <script>
        // === Konfigurasi API ===
        // JANGAN LUPA GANTI DENGAN API KEY TMDB ANDA
        const API_KEY = '006ce472ff1d269dacb4ff625e4301ef'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        // Endpoint Populer
        const API_URL = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`;
        // Endpoint Pencarian (Dibutuhkan untuk query)
        const SEARCH_API = `${BASE_URL}/search/movie?api_key=${API_KEY}&language=id-ID&query=`;
        
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        // Elemen DOM
        const mainGrid = document.getElementById('movie-grid');
        const modal = document.getElementById('movie-modal');
        const closeBtn = document.getElementById('close-btn');
        const playerContainer = document.getElementById('player-container');
        const searchInput = document.getElementById('search-input');
        const sectionTitle = document.getElementById('section-title');
        const logo = document.getElementById('logo');

        // Fungsi mengambil data film dari API
        async function getMovies(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();
                showMovies(data.results);
            } catch (error) {
                console.error('Gagal mengambil data:', error);
                mainGrid.innerHTML = `<div class="message">Gagal memuat film. Pastikan API Key valid dan koneksi internet lancar.</div>`;
            }
        }

        // Fungsi merender data film ke grid
        function showMovies(movies) {
            mainGrid.innerHTML = ''; 

            if (!movies || movies.length === 0) {
                mainGrid.innerHTML = '<div class="message">Tidak ada film yang ditemukan untuk pencarian ini.</div>';
                return;
            }

            movies.forEach(movie => {
                const { title, poster_path, vote_average, id } = movie;
                // Lewati film tanpa poster agar grid tetap rapi
                if (!poster_path) return; 

                const movieEl = document.createElement('div');
                movieEl.classList.add('movie-card');

                movieEl.innerHTML = `
                    <img src="${IMG_PATH + poster_path}" alt="${title}" loading="lazy">
                    <div class="movie-info">
                        <h3>${title}</h3>
                        <div class="rating">${vote_average.toFixed(1)} Rating</div>
                    </div>
                `;
                
                // Buka modal pemutar video saat diklik
                movieEl.addEventListener('click', () => {
                    openModal(id);
                });

                mainGrid.appendChild(movieEl);
            });
        }

        // === LOGIKA PENCARIAN BARU ===
        searchInput.addEventListener('keypress', (e) => {
            // Memeriksa jika tombol yang ditekan adalah 'Enter'
            if (e.key === 'Enter') {
                const searchTerm = searchInput.value.trim();

                if (searchTerm) {
                    // Panggil API pencarian dengan encodeURIComponent agar aman untuk URL (misal menangani spasi)
                    getMovies(SEARCH_API + encodeURIComponent(searchTerm));
                    // Ubah judul section
                    sectionTitle.innerText = `Hasil Pencarian: "${searchTerm}"`;
                } else {
                    // Jika kolom dikosongkan dan di-Enter, kembalikan ke film populer
                    getMovies(API_URL);
                    sectionTitle.innerText = 'Sedang Tren Sekarang';
                }
            }
        });

        // Fitur tambahan: Klik logo untuk mereset tampilan ke daftar awal
        logo.addEventListener('click', () => {
            searchInput.value = '';
            getMovies(API_URL);
            sectionTitle.innerText = 'Sedang Tren Sekarang';
        });

        // === Fungsi Modal Pemutar ===
        function openModal(movieId) {
            playerContainer.innerHTML = `
                <iframe 
                    src="https://vidsrc.me/embed/movie?tmdb=${movieId}" 
                    allowfullscreen 
                    allow="autoplay; encrypted-media">
                </iframe>
            `;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            playerContainer.innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
        });

        // Jalankan aplikasi pertama kali
        getMovies(API_URL);
    </script>
</body>
</html>
