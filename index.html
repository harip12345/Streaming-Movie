<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Film Populer dengan Genre, Watchlist & Player</title>
    <style>
        /* === Variabel Warna ala Netflix === */
        :root {
            --bg-color: #141414;
            --card-bg: #2f2f2f;
            --text-color: #e5e5e5;
            --primary-color: #e50914; 
            --rating-color: #46d369; 
        }

        /* === Reset & Base Styles === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* === Header & Navigasi Utama === */
        header {
            padding: 20px 4% 0;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0));
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        header h1:hover {
            transform: scale(1.05);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .watchlist-nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .watchlist-nav-btn:hover {
            color: #b3b3b3;
        }

        /* === Kolom Pencarian === */
        .search-container input {
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            width: 200px;
            transition: width 0.4s ease, border-color 0.3s ease, background-color 0.3s ease;
        }

        .search-container input:focus {
            width: 280px;
            border-color: var(--primary-color);
            background-color: rgba(0, 0, 0, 0.9);
        }

        /* === Navigasi Genre === */
        .genre-nav {
            padding: 10px 4%;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            /* Menyembunyikan scrollbar agar terlihat rapi */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        .genre-nav::-webkit-scrollbar { 
            display: none; 
        }

        .genre-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .genre-btn:hover, .genre-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        /* === Main Container === */
        main {
            padding: 20px 4% 40px;
        }

        main h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* === CSS Grid untuk Katalog Film === */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* === Movie Card Styles === */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 15px;
            background: linear-gradient(to top, #181818 0%, transparent 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .movie-info {
            opacity: 1;
        }

        .movie-info h3 {
            margin: 0;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .rating {
            color: var(--rating-color);
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* === Tombol Bookmark (Watchlist) === */
        .bookmark-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            z-index: 3; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s;
        }

        .bookmark-btn:hover {
            transform: scale(1.15);
            background: rgba(0, 0, 0, 0.9);
        }

        .heart-icon {
            width: 20px;
            height: 20px;
            fill: transparent; 
            stroke: #fff;      
            stroke-width: 2px;
            transition: fill 0.3s, stroke 0.3s;
        }

        .bookmark-btn.saved .heart-icon {
            fill: var(--primary-color);
            stroke: var(--primary-color);
        }

        /* === Pesan Error/Loading === */
        .message {
            text-align: center;
            font-size: 1.2rem;
            color: #999;
            grid-column: 1 / -1;
            padding: 40px;
        }

        /* === MODAL POP-UP STYLES === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="logo">Notflix</h1>
        <div class="nav-right">
            <button id="nav-watchlist" class="watchlist-nav-btn">Daftar Tontonan</button>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Cari judul film...">
            </div>
        </div>
    </header>

    <nav class="genre-nav" id="genre-nav">
        <button class="genre-btn active" data-id="trend">🔥 Sedang Tren</button>
        <button class="genre-btn" data-id="28">Action</button>
        <button class="genre-btn" data-id="35">Comedy</button>
        <button class="genre-btn" data-id="27">Horror</button>
        <button class="genre-btn" data-id="878">Sci-Fi</button>
        <button class="genre-btn" data-id="10749">Romance</button>
        <button class="genre-btn" data-id="16">Animation</button>
        <button class="genre-btn" data-id="18">Drama</button>
    </nav>

    <main>
        <h2 id="section-title">Sedang Tren Sekarang</h2>
        <div id="movie-grid" class="movie-grid">
            <div class="message">Memuat data film...</div>
        </div>
    </main>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span id="close-btn" class="close-btn">&times; Tutup</span>
            <div id="player-container" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <script>
        // === Konfigurasi API ===
        const API_KEY = '006ce472ff1d269dacb4ff625e4301ef'; // GANTI DENGAN API KEY ANDA
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        // Endpoints
        const API_URL = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`;
        const SEARCH_API = `${BASE_URL}/search/movie?api_key=${API_KEY}&language=id-ID&query=`;
        const DISCOVER_API = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=id-ID&with_genres=`;
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        // Elemen DOM
        const mainGrid = document.getElementById('movie-grid');
        const modal = document.getElementById('movie-modal');
        const closeBtn = document.getElementById('close-btn');
        const playerContainer = document.getElementById('player-container');
        const searchInput = document.getElementById('search-input');
        const sectionTitle = document.getElementById('section-title');
        const logo = document.getElementById('logo');
        const navWatchlist = document.getElementById('nav-watchlist');
        const genreButtons = document.querySelectorAll('.genre-btn');

        // === FUNGSI LOCALSTORAGE ===
        function getWatchlist() { return JSON.parse(localStorage.getItem('notflix_watchlist')) || []; }
        function saveToWatchlist(movie) {
            const watchlist = getWatchlist();
            if (!watchlist.some(m => m.id === movie.id)) {
                watchlist.push(movie);
                localStorage.setItem('notflix_watchlist', JSON.stringify(watchlist));
            }
        }
        function removeFromWatchlist(id) {
            let watchlist = getWatchlist().filter(m => m.id !== id);
            localStorage.setItem('notflix_watchlist', JSON.stringify(watchlist));
        }
        function isBookmarked(id) { return getWatchlist().some(m => m.id === id); }

        // === MENGAMBIL & MENAMPILKAN DATA ===
        async function getMovies(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                showMovies(data.results);
            } catch (error) {
                console.error('Gagal mengambil data:', error);
                mainGrid.innerHTML = `<div class="message">Gagal memuat film. Pastikan API Key valid dan koneksi internet lancar.</div>`;
            }
        }

        function showMovies(movies) {
            mainGrid.innerHTML = ''; 
            if (!movies || movies.length === 0) {
                mainGrid.innerHTML = '<div class="message">Tidak ada film yang ditemukan.</div>';
                return;
            }

            movies.forEach(movie => {
                const { title, poster_path, vote_average, id } = movie;
                if (!poster_path) return; 

                const movieEl = document.createElement('div');
                movieEl.classList.add('movie-card');
                const savedClass = isBookmarked(id) ? 'saved' : '';

                movieEl.innerHTML = `
                    <button class="bookmark-btn ${savedClass}" title="Tambahkan ke Daftar Tontonan">
                        <svg class="heart-icon" viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                    <img src="${IMG_PATH + poster_path}" alt="${title}" loading="lazy">
                    <div class="movie-info">
                        <h3>${title}</h3>
                        <div class="rating">${vote_average.toFixed(1)} Rating</div>
                    </div>
                `;
                
                const bookmarkBtn = movieEl.querySelector('.bookmark-btn');
                bookmarkBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    if (isBookmarked(id)) {
                        removeFromWatchlist(id);
                        bookmarkBtn.classList.remove('saved');
                    } else {
                        saveToWatchlist({ id, title, poster_path, vote_average });
                        bookmarkBtn.classList.add('saved');
                    }
                });

                movieEl.addEventListener('click', () => openModal(id));
                mainGrid.appendChild(movieEl);
            });
        }

        // === EVENT LISTENER FILTER GENRE ===
        genreButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Reset semua kelas aktif
                genreButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); // Tambah kelas aktif pada tombol yang diklik
                
                searchInput.value = ''; // Bersihkan pencarian

                const genreId = btn.getAttribute('data-id');
                const genreName = btn.innerText.replace('🔥 ', ''); // Hapus emoji untuk judul

                if (genreId === 'trend') {
                    getMovies(API_URL);
                    sectionTitle.innerText = 'Sedang Tren Sekarang';
                } else {
                    getMovies(DISCOVER_API + genreId);
                    sectionTitle.innerText = `Film ${genreName}`;
                }
            });
        });

        // === EVENT LISTENER NAVIGASI LAINNYA ===
        navWatchlist.addEventListener('click', () => {
            genreButtons.forEach(b => b.classList.remove('active')); // Reset active tab
            sectionTitle.innerText = 'Daftar Tontonan Saya';
            searchInput.value = ''; 
            showMovies(getWatchlist());
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const searchTerm = searchInput.value.trim();
                genreButtons.forEach(b => b.classList.remove('active')); // Reset active tab

                if (searchTerm) {
                    getMovies(SEARCH_API + encodeURIComponent(searchTerm));
                    sectionTitle.innerText = `Hasil Pencarian: "${searchTerm}"`;
                } else {
                    document.querySelector('[data-id="trend"]').click(); // Kembali ke Tren
                }
            }
        });

        logo.addEventListener('click', () => {
            document.querySelector('[data-id="trend"]').click(); // Kembali ke Tren
        });

        // === FUNGSI MODAL PEMUTAR VIDEO YANG DIPERBAIKI ===
        function openModal(movieId) {
            /* PERBAIKAN FULLSCREEN: 
               Menambahkan atribut webkitallowfullscreen, mozallowfullscreen, 
               serta melengkapi parameter di dalam atribut allow.
            */
            playerContainer.innerHTML = `
                <iframe 
                    src="https://vidsrc.me/embed/movie?tmdb=${movieId}" 
                    frameborder="0"
                    allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
                    allowfullscreen="true"
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true">
                </iframe>
            `;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            playerContainer.innerHTML = ''; 
            document.body.style.overflow = 'auto';
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
        });

        // Mulai aplikasi
        getMovies(API_URL);
    </script>
</body>
</html>
