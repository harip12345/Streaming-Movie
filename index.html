<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notflix</title>
<style>
  :root{
    --bg:#141414;
    --bg-grad:#000;
    --text:#fff;
    --text-dim:#b3b3b3;
    --primary:#e50914;
    --rating:#46d369;
    --card-radius:4px;
    --row-gap:.4vw;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    overflow-x:hidden;
  }
  img{display:block}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:0;height:0}

  /* ===== HEADER ===== */
  header{
    position:fixed;top:0;left:0;width:100%;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 4%;
    transition:background-color .4s ease;
    background:linear-gradient(to bottom,rgba(0,0,0,.85) 10%,transparent);
  }
  header.scrolled{background:var(--bg)}
  .header-left{display:flex;align-items:center;gap:32px}
  .logo{
    color:var(--primary);font-size:1.9rem;font-weight:800;
    letter-spacing:-1px;cursor:pointer;text-transform:uppercase;
    transition:transform .2s;
  }
  .logo:hover{transform:scale(1.04)}
  .main-nav{display:flex;gap:20px}
  .main-nav button{
    background:none;border:none;color:#e5e5e5;font-size:.9rem;
    cursor:pointer;transition:color .3s;
  }
  .main-nav button:hover,.main-nav button.active{color:#fff;font-weight:600}
  .nav-right{display:flex;align-items:center;gap:18px}
  .search-container{display:flex;align-items:center;
    border:1px solid transparent;background:transparent;transition:all .3s;border-radius:4px}
  .search-container.open{border-color:rgba(255,255,255,.6);background:rgba(0,0,0,.75);padding:6px 10px}
  .search-icon{cursor:pointer;fill:#fff;width:22px;height:22px}
  #search-input{
    background:transparent;border:none;color:#fff;outline:none;
    font-size:.9rem;width:0;padding:0;transition:width .4s ease,padding .4s ease;
  }
  .search-container.open #search-input{width:200px;padding-left:10px}
  .watchlist-nav-btn{background:none;border:none;color:#e5e5e5;font-size:.9rem;cursor:pointer;transition:color .3s}
  .watchlist-nav-btn:hover{color:#fff}

  /* ===== HERO / BILLBOARD ===== */
  .hero{
    position:relative;height:80vh;min-height:520px;width:100%;
    background-size:cover;background-position:center top;
    display:flex;align-items:center;
  }
  .hero::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(to right,rgba(20,20,20,.95) 0%,rgba(20,20,20,.5) 35%,transparent 65%),
               linear-gradient(to top,var(--bg) 0%,transparent 35%);
  }
  .hero-content{position:relative;z-index:2;padding:0 4%;max-width:640px}
  .hero-title{font-size:3.2rem;font-weight:800;margin-bottom:18px;line-height:1.05;
    text-shadow:2px 2px 8px rgba(0,0,0,.6)}
  .hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:14px;font-size:1rem}
  .hero-meta .match{color:var(--rating);font-weight:700}
  .hero-overview{font-size:1.05rem;line-height:1.5;color:#e5e5e5;margin-bottom:24px;
    max-width:520px;text-shadow:1px 1px 4px rgba(0,0,0,.7);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-buttons{display:flex;gap:14px}
  .btn{display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;
    font-size:1.1rem;font-weight:700;padding:11px 26px;border-radius:5px;transition:opacity .25s,background .25s}
  .btn svg{width:24px;height:24px}
  .btn-play{background:#fff;color:#000}
  .btn-play:hover{background:rgba(255,255,255,.78)}
  .btn-info{background:rgba(109,109,110,.7);color:#fff}
  .btn-info:hover{background:rgba(109,109,110,.5)}

  /* ===== ROWS ===== */
  .rows-wrap{position:relative;z-index:3;margin-top:-90px;padding-bottom:50px}
  .row{margin:0 0 3vw 0;}
  .row-title{font-size:1.4rem;font-weight:700;margin:0 0 .6em 4%;color:#e5e5e5}
  .row-slider-wrap{position:relative}
  .row-slider{
    display:flex;gap:var(--row-gap);overflow-x:auto;scroll-behavior:smooth;
    padding:0 4%;scroll-padding:0 4%;
  }
  .slider-arrow{
    position:absolute;top:0;bottom:0;width:4%;z-index:20;
    background:rgba(20,20,20,.5);border:none;cursor:pointer;
    color:#fff;font-size:2.4rem;opacity:0;transition:opacity .2s,background .2s;
    display:flex;align-items:center;justify-content:center;
  }
  .row-slider-wrap:hover .slider-arrow{opacity:1}
  .slider-arrow:hover{background:rgba(20,20,20,.8)}
  .slider-arrow.left{left:0}
  .slider-arrow.right{right:0}

  /* ===== CARD ===== */
  .card{
    position:relative;flex:0 0 auto;width:16vw;min-width:200px;max-width:260px;
    border-radius:var(--card-radius);cursor:pointer;transition:transform .35s ease;
    background:#181818;
  }
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--card-radius);background:#222}
  .card:hover{transform:scale(1.12);z-index:30;box-shadow:0 12px 30px rgba(0,0,0,.7)}
  .card-info{
    position:absolute;left:0;right:0;bottom:0;padding:12px;
    background:linear-gradient(to top,#181818 35%,transparent);
    opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;
    border-radius:0 0 var(--card-radius) var(--card-radius);
  }
  .card:hover .card-info{opacity:1;transform:translateY(0)}
  .card-info h3{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
  .icon-btn{
    width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
    background:rgba(42,42,42,.6);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:border-color .2s,background .2s;
  }
  .icon-btn:hover{border-color:#fff;background:rgba(60,60,60,.9)}
  .icon-btn svg{width:16px;height:16px;fill:#fff;stroke:#fff}
  .icon-btn.play{background:#fff}
  .icon-btn.play svg{fill:#000;stroke:#000}
  .icon-btn.saved svg{fill:var(--rating);stroke:var(--rating)}
  .card-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.78rem;color:#ddd}
  .card-meta .match{color:var(--rating);font-weight:700}

  /* ===== TOP 10 ROW ===== */
  .top-card{display:flex;align-items:flex-end;flex:0 0 auto;width:24vw;min-width:280px;max-width:360px}
  .top-rank{
    font-size:11vw;line-height:.8;font-weight:800;color:#141414;
    -webkit-text-stroke:4px #5b5b5b;letter-spacing:-1vw;margin-right:-2.2vw;z-index:1;
    user-select:none;max-font-size:170px;
  }
  .top-card .card{width:11vw;min-width:150px}

  /* ===== MODAL ===== */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;
    justify-content:center;align-items:flex-start;overflow-y:auto;padding:40px 0}
  .modal.open{display:flex}
  .modal-card{position:relative;width:92%;max-width:900px;background:#181818;border-radius:8px;
    overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.8);animation:pop .3s ease}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-hero{position:relative;width:100%;aspect-ratio:16/9;background-size:cover;background-position:center}
  .modal-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,#181818,transparent 60%)}
  .modal-player{width:100%;aspect-ratio:16/9;border:none;background:#000}
  .modal-hero-content{position:absolute;bottom:0;left:0;z-index:3;padding:0 40px 28px}
  .modal-hero-content h2{font-size:2.2rem;font-weight:800;margin-bottom:18px;text-shadow:2px 2px 6px rgba(0,0,0,.7)}
  .modal-body{padding:20px 40px 36px}
  .modal-meta{display:flex;align-items:center;gap:14px;font-size:.95rem;margin-bottom:16px;color:#ddd}
  .modal-meta .match{color:var(--rating);font-weight:700}
  .modal-meta .tag{border:1px solid rgba(255,255,255,.4);padding:1px 7px;border-radius:3px;font-size:.8rem}
  .modal-overview{font-size:1rem;line-height:1.55;color:#e5e5e5}
  .close-btn{position:absolute;top:14px;right:14px;z-index:10;width:38px;height:38px;border-radius:50%;
    background:#181818;border:none;color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .close-btn:hover{background:#333}

  .message{text-align:center;font-size:1.1rem;color:#999;padding:40px;width:100%}
  .spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--primary);
    border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== RESPONSIVE ===== */
  @media(max-width:900px){
    .main-nav{display:none}
    .hero-title{font-size:2.2rem}
    .hero-overview{font-size:.95rem}
    .card{width:32vw}
    .top-card{width:55vw}
    .top-rank{font-size:24vw}
  }
  @media(max-width:560px){
    .card{width:40vw}
    .hero{height:70vh}
    .modal-hero-content,.modal-body{padding-left:20px;padding-right:20px}
  }
</style>
</head>
<body>

<header id="header">
  <div class="header-left">
    <span class="logo" id="logo">Notflix</span>
    <nav class="main-nav" id="main-nav">
      <button data-id="trend" class="active">Beranda</button>
      <button data-id="28">Action</button>
      <button data-id="35">Komedi</button>
      <button data-id="27">Horor</button>
      <button data-id="878">Sci-Fi</button>
      <button data-id="10749">Romansa</button>
      <button data-id="16">Animasi</button>
      <button data-id="18">Drama</button>
    </nav>
  </div>
  <div class="nav-right">
    <div class="search-container" id="search-container">
      <svg class="search-icon" id="search-icon" viewBox="0 0 24 24"><path d="M21.71 20.29l-3.4-3.39A8.94 8.94 0 0020 11a9 9 0 10-9 9 8.94 8.94 0 005.9-2.69l3.39 3.4a1 1 0 001.42-1.42zM4 11a7 7 0 117 7 7 7 0 01-7-7z"/></svg>
      <input type="text" id="search-input" placeholder="Judul, orang, genre">
    </div>
    <button class="watchlist-nav-btn" id="nav-watchlist">Daftar Saya</button>
  </div>
</header>

<section class="hero" id="hero"></section>

<div class="rows-wrap" id="rows-wrap">
  <div class="spinner"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-card" id="modal-card">
    <button class="close-btn" id="close-btn">&times;</button>
    <div id="modal-inner"></div>
  </div>
</div>

<script>
  // ===== KONFIGURASI =====
  const API_KEY = '006ce472ff1d269dacb4ff625e4301ef'; // GANTI dengan API key TMDB Anda
  const BASE = 'https://api.themoviedb.org/3';
  const IMG = 'https://image.tmdb.org/t/p/w500';
  const BACKDROP = 'https://image.tmdb.org/t/p/original';
  const LANG = 'id-ID';

  const GENRES = {28:'Action',35:'Komedi',27:'Horor',878:'Sci-Fi',10749:'Romansa',16:'Animasi',18:'Drama'};

  // ===== ELEMEN =====
  const header = document.getElementById('header');
  const hero = document.getElementById('hero');
  const rowsWrap = document.getElementById('rows-wrap');
  const modal = document.getElementById('modal');
  const modalInner = document.getElementById('modal-inner');
  const closeBtn = document.getElementById('close-btn');
  const logo = document.getElementById('logo');
  const navWatchlist = document.getElementById('nav-watchlist');
  const navButtons = document.querySelectorAll('#main-nav button');
  const searchContainer = document.getElementById('search-container');
  const searchIcon = document.getElementById('search-icon');
  const searchInput = document.getElementById('search-input');

  let movieCache = {}; // simpan detail film untuk modal

  // ===== LOCALSTORAGE =====
  const getWatchlist = () => JSON.parse(localStorage.getItem('notflix_watchlist')) || [];
  const isSaved = id => getWatchlist().some(m => m.id === id);
  function toggleSave(movie){
    let wl = getWatchlist();
    if(isSaved(movie.id)) wl = wl.filter(m => m.id !== movie.id);
    else wl.push(movie);
    localStorage.setItem('notflix_watchlist', JSON.stringify(wl));
  }

  // ===== FETCH =====
  async function fetchJSON(url){
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }
  const popularURL = p => `${BASE}/movie/popular?api_key=${API_KEY}&language=${LANG}&page=${p||1}`;
  const trendingURL = () => `${BASE}/trending/movie/week?api_key=${API_KEY}&language=${LANG}`;
  const genreURL = (g,p) => `${BASE}/discover/movie?api_key=${API_KEY}&language=${LANG}&with_genres=${g}&sort_by=popularity.desc&page=${p||1}`;
  const topRatedURL = () => `${BASE}/movie/top_rated?api_key=${API_KEY}&language=${LANG}&page=1`;
  const searchURL = q => `${BASE}/search/movie?api_key=${API_KEY}&language=${LANG}&query=${encodeURIComponent(q)}`;
  const detailURL = id => `${BASE}/movie/${id}?api_key=${API_KEY}&language=${LANG}`;

  // ===== HERO / BILLBOARD =====
  function renderHero(movie){
    if(!movie){hero.style.display='none';return;}
    hero.style.display='flex';
    movieCache[movie.id] = movie;
    const bg = movie.backdrop_path ? BACKDROP + movie.backdrop_path : (movie.poster_path ? IMG + movie.poster_path : '');
    hero.style.backgroundImage = `url('${bg}')`;
    const year = (movie.release_date||'').slice(0,4);
    const match = Math.round((movie.vote_average||0)*10);
    hero.innerHTML = `
      <div class="hero-content">
        <h1 class="hero-title">${movie.title||''}</h1>
        <div class="hero-meta">
          <span class="match">${match}% cocok</span>
          ${year?`<span>${year}</span>`:''}
          <span>⭐ ${(movie.vote_average||0).toFixed(1)}</span>
        </div>
        <p class="hero-overview">${movie.overview||'Tidak ada deskripsi tersedia.'}</p>
        <div class="hero-buttons">
          <button class="btn btn-play"><svg viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg> Putar</button>
          <button class="btn btn-info"><svg viewBox="0 0 24 24" fill="#fff"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg> Info Selengkapnya</button>
        </div>
      </div>`;
    hero.querySelector('.btn-play').onclick = () => openPlayer(movie.id);
    hero.querySelector('.btn-info').onclick = () => openDetail(movie.id);
  }

  // ===== KARTU =====
  function cardHTML(movie){
    const year = (movie.release_date||'').slice(0,4);
    const match = Math.round((movie.vote_average||0)*10);
    const saved = isSaved(movie.id) ? 'saved' : '';
    return `
      <div class="card" data-id="${movie.id}">
        <img src="${IMG + movie.poster_path}" alt="${movie.title}" loading="lazy">
        <div class="card-info">
          <h3>${movie.title}</h3>
          <div class="card-actions">
            <button class="icon-btn play" title="Putar"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="icon-btn save ${saved}" title="Daftar Saya"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
            <button class="icon-btn info" title="Info" style="margin-left:auto"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
          </div>
          <div class="card-meta"><span class="match">${match}% cocok</span>${year?`<span>${year}</span>`:''}</div>
        </div>
      </div>`;
  }

  function bindCard(el, movie){
    movieCache[movie.id] = movie;
    el.querySelector('img').onclick = () => openDetail(movie.id);
    el.querySelector('.play').onclick = e => {e.stopPropagation(); openPlayer(movie.id);};
    el.querySelector('.info').onclick = e => {e.stopPropagation(); openDetail(movie.id);};
    const saveBtn = el.querySelector('.save');
    saveBtn.onclick = e => {
      e.stopPropagation();
      toggleSave({id:movie.id,title:movie.title,poster_path:movie.poster_path,vote_average:movie.vote_average,release_date:movie.release_date,backdrop_path:movie.backdrop_path,overview:movie.overview});
      saveBtn.classList.toggle('saved');
    };
  }

  // ===== BARIS BIASA =====
  function buildRow(title, movies, isTop){
    const valid = (movies||[]).filter(m => m.poster_path);
    if(!valid.length) return null;
    const row = document.createElement('section');
    row.className = 'row';
    row.innerHTML = `<h2 class="row-title">${title}</h2>
      <div class="row-slider-wrap">
        <button class="slider-arrow left">&#8249;</button>
        <div class="row-slider"></div>
        <button class="slider-arrow right">&#8250;</button>
      </div>`;
    const slider = row.querySelector('.row-slider');
    valid.forEach((movie, i) => {
      if(isTop){
        const wrap = document.createElement('div');
        wrap.className = 'top-card';
        wrap.innerHTML = `<span class="top-rank">${i+1}</span>` + cardHTML(movie);
        const card = wrap.querySelector('.card');
        bindCard(card, movie);
        slider.appendChild(wrap);
      } else {
        const tmp = document.createElement('div');
        tmp.innerHTML = cardHTML(movie);
        const card = tmp.firstElementChild;
        bindCard(card, movie);
        slider.appendChild(card);
      }
    });
    row.querySelector('.left').onclick = () => slider.scrollBy({left:-slider.clientWidth*0.85,behavior:'smooth'});
    row.querySelector('.right').onclick = () => slider.scrollBy({left:slider.clientWidth*0.85,behavior:'smooth'});
    return row;
  }

  // ===== GRID SEDERHANA (search/watchlist) =====
  function buildGrid(title, movies){
    const valid = (movies||[]).filter(m => m.poster_path);
    const sec = document.createElement('section');
    sec.className = 'row';
    if(!valid.length){
      sec.innerHTML = `<h2 class="row-title">${title}</h2><div class="message">Tidak ada film ditemukan.</div>`;
      return sec;
    }
    sec.innerHTML = `<h2 class="row-title">${title}</h2>`;
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:0 4%';
    valid.forEach(movie => {
      const tmp = document.createElement('div');
      tmp.innerHTML = cardHTML(movie);
      const card = tmp.firstElementChild;
      card.style.width='100%';card.style.maxWidth='none';card.style.minWidth='0';
      bindCard(card, movie);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    return sec;
  }

  // ===== HALAMAN BERANDA =====
  async function loadHome(){
    rowsWrap.innerHTML = '<div class="spinner"></div>';
    try{
      const [trending, popular, topRated, action, comedy, horror, scifi] = await Promise.all([
        fetchJSON(trendingURL()),
        fetchJSON(popularURL()),
        fetchJSON(topRatedURL()),
        fetchJSON(genreURL(28)),
        fetchJSON(genreURL(35)),
        fetchJSON(genreURL(27)),
        fetchJSON(genreURL(878)),
      ]);
      renderHero((trending.results||[]).filter(m=>m.backdrop_path)[Math.floor(Math.random()*5)] || trending.results[0]);
      rowsWrap.innerHTML = '';
      const rows = [
        buildRow('Sedang Tren', trending.results),
        buildRow('10 Teratas Hari Ini', (topRated.results||[]).slice(0,10), true),
        buildRow('Populer di Notflix', popular.results),
        buildRow('Film Laga', action.results),
        buildRow('Komedi Pilihan', comedy.results),
        buildRow('Bikin Merinding', horror.results),
        buildRow('Fiksi Ilmiah', scifi.results),
      ];
      rows.forEach(r => r && rowsWrap.appendChild(r));
    }catch(e){
      console.error(e);
      rowsWrap.innerHTML = '<div class="message">Gagal memuat. Pastikan API Key TMDB valid dan koneksi internet lancar.</div>';
    }
  }

  // ===== HALAMAN GENRE =====
  async function loadGenre(id){
    rowsWrap.innerHTML = '<div class="spinner"></div>';
    try{
      const [p1,p2] = await Promise.all([fetchJSON(genreURL(id,1)),fetchJSON(genreURL(id,2))]);
      const all = [...(p1.results||[]),...(p2.results||[])];
      renderHero((p1.results||[]).filter(m=>m.backdrop_path)[0] || p1.results[0]);
      rowsWrap.innerHTML = '';
      rowsWrap.appendChild(buildGrid('Film ' + (GENRES[id]||''), all));
    }catch(e){
      rowsWrap.innerHTML = '<div class="message">Gagal memuat film genre ini.</div>';
    }
  }

  // ===== PENCARIAN =====
  async function doSearch(q){
    rowsWrap.innerHTML = '<div class="spinner"></div>';
    try{
      const data = await fetchJSON(searchURL(q));
      hero.style.display='none';
      rowsWrap.style.marginTop='90px';
      rowsWrap.innerHTML = '';
      rowsWrap.appendChild(buildGrid(`Hasil untuk: "${q}"`, data.results));
    }catch(e){
      rowsWrap.innerHTML = '<div class="message">Pencarian gagal.</div>';
    }
  }

  function showWatchlist(){
    hero.style.display='none';
    rowsWrap.style.marginTop='90px';
    rowsWrap.innerHTML='';
    rowsWrap.appendChild(buildGrid('Daftar Saya', getWatchlist()));
  }

  // ===== MODAL DETAIL =====
  async function openDetail(id){
    let movie = movieCache[id];
    try{ movie = await fetchJSON(detailURL(id)); movieCache[id]=movie; }catch(e){}
    if(!movie) return;
    const bg = movie.backdrop_path ? BACKDROP+movie.backdrop_path : IMG+movie.poster_path;
    const year = (movie.release_date||'').slice(0,4);
    const match = Math.round((movie.vote_average||0)*10);
    const runtime = movie.runtime ? `${Math.floor(movie.runtime/60)}j ${movie.runtime%60}m` : '';
    const genreNames = (movie.genres||[]).map(g=>g.name).join(' • ');
    modalInner.innerHTML = `
      <div class="modal-hero" style="background-image:url('${bg}')">
        <div class="modal-hero-content">
          <h2>${movie.title}</h2>
          <button class="btn btn-play" id="modal-play"><svg viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg> Putar</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <span class="match">${match}% cocok</span>
          ${year?`<span>${year}</span>`:''}
          ${runtime?`<span>${runtime}</span>`:''}
          <span class="tag">HD</span>
          <span>⭐ ${(movie.vote_average||0).toFixed(1)}</span>
        </div>
        <p class="modal-overview">${movie.overview||'Tidak ada deskripsi.'}</p>
        ${genreNames?`<p style="margin-top:14px;color:#777;font-size:.9rem">Genre: ${genreNames}</p>`:''}
      </div>`;
    document.getElementById('modal-play').onclick = () => openPlayer(id);
    modal.classList.add('open');
    document.body.style.overflow='hidden';
  }

  // ===== MODAL PLAYER =====
  function openPlayer(id){
    modalInner.innerHTML = `<iframe class="modal-player" src="https://vidsrc.me/embed/movie?tmdb=${id}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>`;
    modal.classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeModal(){
    modal.classList.remove('open');
    modalInner.innerHTML='';
    document.body.style.overflow='auto';
  }

  // ===== EVENTS =====
  window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 60));

  navButtons.forEach(btn => btn.onclick = () => {
    navButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value=''; searchContainer.classList.remove('open');
    rowsWrap.style.marginTop='-90px';
    const id = btn.dataset.id;
    if(id==='trend') loadHome(); else loadGenre(id);
    window.scrollTo({top:0,behavior:'smooth'});
  });

  logo.onclick = () => { navButtons[0].click(); };
  navWatchlist.onclick = () => { navButtons.forEach(b=>b.classList.remove('active')); showWatchlist(); window.scrollTo({top:0,behavior:'smooth'}); };

  searchIcon.onclick = () => { searchContainer.classList.toggle('open'); if(searchContainer.classList.contains('open')) searchInput.focus(); };
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if(!q){ navButtons[0].click(); return; }
    searchTimer = setTimeout(()=>doSearch(q), 400);
  });

  closeBtn.onclick = closeModal;
  modal.addEventListener('click', e => { if(e.target===modal) closeModal(); });
  window.addEventListener('keydown', e => { if(e.key==='Escape' && modal.classList.contains('open')) closeModal(); });

  // ===== MULAI =====
  loadHome();
</script>
</body>
</html>
